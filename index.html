<!DOCTYPE html>
<html>

<body>

    <h3>Wallet Signing Tool</h3>

    <form id="form">

        <fieldset>
            <legend>Signing standard</legend>

            <label>
                <input type="radio" name="eip" value="eip191" checked>
                EIP-191 (personal_sign)
            </label>

            <label>
                <input type="radio" name="eip" value="eip712">
                EIP-712 (typed data)
            </label>
        </fieldset>

        <fieldset>
            <legend>Input</legend>

            <label>
                <input type="radio" name="mode" value="file" checked>
                File
            </label>

            <input type="file" name="file">

            <hr>

            <label>
                <input type="radio" name="mode" value="message">
                Message
            </label>

            <textarea name="message"></textarea>
        </fieldset>

        <button type="submit">Sign</button>

    </form>

    <pre id="out"></pre>

    <script type="module">
        import { run } from "./signer.js";

        document.getElementById("form").addEventListener("submit", (e) => {
            e.preventDefault();
            run(window, e.target, "#out");
        });
    </script>

</body>

</html>
